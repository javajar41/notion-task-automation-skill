<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion 任务自动化看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%);
            color: #fff;
            padding: 40px;
            min-height: 100vh;
        }
        h1 { text-align: center; margin-bottom: 40px; color: #00d4ff; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-number { font-size: 36px; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 14px; opacity: 0.8; margin-top: 8px; }
        .task-list { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .task-item:last-child { border-bottom: none; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 15px;
        }
        .status-todo { background: #6b7280; }
        .status-pending { background: #f59e0b; }
        .status-confirmed { background: #10b981; }
        .status-progress { background: #3b82f6; }
        .status-done { background: #8b5cf6; }
        .update-time { text-align: center; margin-top: 40px; opacity: 0.6; font-size: 14px; }
    </style>
</head>
<body>
    <h1>📊 Notion 任务自动化看板</h1>
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number">5</div>
            <div class="stat-label">总任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">新任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">2</div>
            <div class="stat-label">待确认</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">已确认</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">1</div>
            <div class="stat-label">进行中</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">2</div>
            <div class="stat-label">已完成</div>
        </div>
    </div>
    
    <div class="task-list">
        <h2 style="margin-bottom: 20px;">📋 任务列表</h2>
        <div class="task-item">
            <span class="status-badge status-pending">待确认</span>
            <div>
                <div style="font-weight: bold;">Hello World 页面</div>
                <div style="font-size: 12px; opacity: 0.7; margin-top: 4px;">V1.1</div>
            </div>
        </div>
        <div class="task-item">
            <span class="status-badge status-progress">进行中</span>
            <div>
                <div style="font-weight: bold;">联通官网界面</div>
                <div style="font-size: 12px; opacity: 0.7; margin-top: 4px;">V1.1</div>
            </div>
        </div>
        <div class="task-item">
            <span class="status-badge status-done">已完成</span>
            <div>
                <div style="font-weight: bold;">未命名</div>
                <div style="font-size: 12px; opacity: 0.7; margin-top: 4px;">V1</div>
            </div>
        </div>
        <div class="task-item">
            <span class="status-badge status-done">已完成</span>
            <div>
                <div style="font-weight: bold;">天气查询应用</div>
                <div style="font-size: 12px; opacity: 0.7; margin-top: 4px;">V1</div>
            </div>
        </div>
        <div class="task-item">
            <span class="status-badge status-pending">待确认</span>
            <div>
                <div style="font-weight: bold;">计算器</div>
                <div style="font-size: 12px; opacity: 0.7; margin-top: 4px;">V1.1</div>
            </div>
        </div>
    </div>
    
    <div class="update-time">
        最后更新: 2026-03-04 12:36:27
    </div>
</body>
</html>
